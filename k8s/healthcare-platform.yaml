kind: Service
metadata:
  name: patient-service
spec:
  ports:
    - port: 8084
  selector:
    app: patient-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: localhost:5000/healthcare-platform-api-gateway:latest
          imagePullPolicy: Never
          env:
            - name: AUTH_SERVICE_URL
              value: http://auth-service:8081
            - name: DOCTOR_SERVICE_URL
              value: http://doctor-service:8082
            - name: APPOINTMENT_SERVICE_URL
              value: http://appointment-service:8083
            - name: PATIENT_SERVICE_URL
              value: http://patient-service:8084
            - name: PAYMENT_SERVICE_URL
              value: http://payment-service:8086
            - name: TELEMEDICINE_SERVICE_URL
              value: http://telemedicine-service:8087
            - name: PRESCRIPTION_SERVICE_URL
              value: http://prescription-service:8088
            - name: NOTIFICATION_SERVICE_URL
              value: http://notification-service:8089
            - name: AI_SERVICE_URL
              value: http://ai-symptom-checker-service:8085
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  type: LoadBalancer
  ports:
    - port: 8080
  selector:
    app: api-gateway
