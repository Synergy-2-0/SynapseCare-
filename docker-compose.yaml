services:
  postgres:
    image: 'postgres:15'
    container_name: synapscare-postgres
    environment:
      - 'POSTGRES_DB=synapscare'
      - 'POSTGRES_PASSWORD=1234'
      - 'POSTGRES_USER=postgres'
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthcare-network
    volumes:
      - postgres-data:/var/lib/postgresql/data

  rabbitmq:
    image: 'rabbitmq:3-management'
    container_name: synapscare-rabbitmq
    ports:
      - '5672:5672'   # AMQP port
      - '15672:15672' # Management UI
    environment:
      - 'RABBITMQ_DEFAULT_USER=admin'
      - 'RABBITMQ_DEFAULT_PASS=admin123'
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthcare-network
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  auth-service:
    build: ./auth-service
    container_name: synapscare-auth-service
    ports:
      - '8081:8081'
    environment:
      - 'SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/synapscare'
      - 'SPRING_DATASOURCE_USERNAME=postgres'
      - 'SPRING_DATASOURCE_PASSWORD=1234'
      - 'SPRING_JPA_HIBERNATE_DDL_AUTO=update'
      - 'SPRING_APPLICATION_NAME=userService'
      - 'SPRING_RABBITMQ_HOST=rabbitmq'
      - 'SPRING_RABBITMQ_PORT=5672'
      - 'SPRING_RABBITMQ_USERNAME=admin'
      - 'SPRING_RABBITMQ_PASSWORD=admin123'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - healthcare-network
    restart: unless-stopped

  doctor-service:
    build: ./doctor-service
    container_name: synapscare-doctor-service
    ports:
      - '8082:8082'
    environment:
      - 'SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/synapscare'
      - 'SPRING_DATASOURCE_USERNAME=postgres'
      - 'SPRING_DATASOURCE_PASSWORD=1234'
      - 'SPRING_JPA_HIBERNATE_DDL_AUTO=update'
      - 'SPRING_APPLICATION_NAME=doctor-service'
      - 'SPRING_RABBITMQ_HOST=rabbitmq'
      - 'SPRING_RABBITMQ_PORT=5672'
      - 'SPRING_RABBITMQ_USERNAME=admin'
      - 'SPRING_RABBITMQ_PASSWORD=admin123'
      - 'APP_AUTH_SERVICE_URL=http://auth-service:8081'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - healthcare-network
    restart: unless-stopped

  ai-symptom-checker-service:
    build: ./AI-SymptomChecker-Service
    container_name: synapscare-ai-symptom-checker
    ports:
      - '8085:8085'
    environment:
      - 'MISTRAL_API_KEY=${MISTRAL_API_KEY:-yAgB9m01JEg3YaFmT2OMa9iAuowSkhkA}'
      - 'JWT_SECRET=ejedVZ4KIRRaAy8kWjs4QSadL823O1WKUDanGentLY3'
    networks:
      - healthcare-network
    restart: unless-stopped

networks:
  healthcare-network:
    driver: bridge

volumes:
  postgres-data:
  rabbitmq-data:
