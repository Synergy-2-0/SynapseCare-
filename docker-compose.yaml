services:
  postgres:
    image: postgres:15
    container_name: synapscare-postgres
    stop_grace_period: 90s
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: synapscare
    ports:
      - '5433:5432'
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d synapscare -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    networks:
      - healthcare-network

  rabbitmq:
    image: 'rabbitmq:3-management'
    container_name: synapscare-rabbitmq
    ports:
      - '5672:5672'   # AMQP port
      - '15672:15672' # Management UI
    environment:
      - 'RABBITMQ_DEFAULT_USER=admin'
      - 'RABBITMQ_DEFAULT_PASS=admin123'
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - healthcare-network
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  appointment-service:
    build: ./appointment-service
    container_name: synapscare-appointment-service
    ports:
      - '8083:8083'
    environment:
      - 'SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/synapscare'
      - 'SPRING_DATASOURCE_USERNAME=postgres'
      - 'SPRING_DATASOURCE_PASSWORD=1234'
      - 'SPRING_JPA_HIBERNATE_DDL_AUTO=update'
      - 'SPRING_APPLICATION_NAME=appointment-service'
      - 'SPRING_RABBITMQ_HOST=rabbitmq'
      - 'SPRING_RABBITMQ_PORT=5672'
      - 'SPRING_RABBITMQ_USERNAME=admin'
      - 'SPRING_RABBITMQ_PASSWORD=admin123'
      - 'DOCTOR_SERVICE_URL=http://doctor-service:8082'
      - 'PATIENT_SERVICE_URL=http://patient-service:8084'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - healthcare-network
    restart: unless-stopped



  auth-service:
    build: ./auth-service
    container_name: synapscare-auth-service
    ports:
      - '8081:8081'
    environment:
      - 'SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/synapscare'
      - 'SPRING_DATASOURCE_USERNAME=postgres'
      - 'SPRING_DATASOURCE_PASSWORD=1234'
      - 'SPRING_JPA_HIBERNATE_DDL_AUTO=update'
      - 'SPRING_APPLICATION_NAME=userService'
      - 'SPRING_RABBITMQ_HOST=rabbitmq'
      - 'SPRING_RABBITMQ_PORT=5672'
      - 'SPRING_RABBITMQ_USERNAME=admin'
      - 'SPRING_RABBITMQ_PASSWORD=admin123'
      - 'APP_SEED_ENABLED=true'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - healthcare-network
    restart: unless-stopped

  doctor-service:
    build: ./doctor-service
    container_name: synapscare-doctor-service
    ports:
      - '8082:8082'
    environment:
      - 'SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/synapscare'
      - 'SPRING_DATASOURCE_USERNAME=postgres'
      - 'SPRING_DATASOURCE_PASSWORD=1234'
      - 'SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver'
      - 'SPRING_JPA_HIBERNATE_DDL_AUTO=update'
      - 'SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.PostgreSQLDialect'
      - 'SPRING_APPLICATION_NAME=doctor-service'
      - 'SPRING_RABBITMQ_HOST=rabbitmq'
      - 'SPRING_RABBITMQ_PORT=5672'
      - 'SPRING_RABBITMQ_USERNAME=admin'
      - 'SPRING_RABBITMQ_PASSWORD=admin123'
      - 'APP_AUTH_SERVICE_URL=http://auth-service:8081'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - healthcare-network
    restart: unless-stopped

  patient-service:
    build: ./patient-service
    container_name: synapscare-patient-service
    ports:
      - '8084:8084'
    environment:
      - 'SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/synapscare'
      - 'SPRING_DATASOURCE_USERNAME=postgres'
      - 'SPRING_DATASOURCE_PASSWORD=1234'
      - 'SPRING_JPA_HIBERNATE_DDL_AUTO=update'
      - 'SPRING_APPLICATION_NAME=patient-service'
      - 'SPRING_RABBITMQ_HOST=rabbitmq'
      - 'SPRING_RABBITMQ_PORT=5672'
      - 'SPRING_RABBITMQ_USERNAME=admin'
      - 'SPRING_RABBITMQ_PASSWORD=admin123'
      - 'MINIO_URL=http://minio:9000'
      - 'MINIO_ACCESS_KEY=minioadmin'
      - 'MINIO_SECRET_KEY=minioadmin'
      - 'MINIO_BUCKET=medical-reports'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - healthcare-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: synapscare-minio
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      - 'MINIO_ROOT_USER=minioadmin'
      - 'MINIO_ROOT_PASSWORD=minioadmin'
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - healthcare-network
    restart: unless-stopped

  ai-symptom-checker-service:
    build: ./AI-SymptomChecker-Service
    container_name: synapscare-ai-symptom-checker
    ports:
      - '8085:8085'
    environment:
      - 'MISTRAL_API_KEY=${MISTRAL_API_KEY:-yAgB9m01JEg3YaFmT2OMa9iAuowSkhkA}'
      - 'JWT_SECRET=ejedVZ4KIRRaAy8kWjs4QSadL823O1WKUDanGentLY3'
    networks:
      - healthcare-network
    restart: unless-stopped

  payment-service:
    build: ./payment-service
    container_name: synapscare-payment-service
    ports:
      - '8086:8086'
    environment:
      - 'SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/synapscare'
      - 'SPRING_DATASOURCE_USERNAME=postgres'
      - 'SPRING_DATASOURCE_PASSWORD=1234'
      - 'SPRING_JPA_HIBERNATE_DDL_AUTO=update'
      - 'SPRING_APPLICATION_NAME=payment-service'
      - 'SPRING_RABBITMQ_HOST=rabbitmq'
      - 'SPRING_RABBITMQ_PORT=5672'
      - 'SPRING_RABBITMQ_USERNAME=admin'
      - 'SPRING_RABBITMQ_PASSWORD=admin123'
      - 'PAYHERE_MERCHANT_ID=1233989'
      - 'PAYHERE_MERCHANT_SECRET=MTcyODEzMjU3MzIyNzA0OTMxODkyMDU1NjQ2NTExMjAwNjgyODc2Mg=='
      - 'APP_NOTIFY_URL=https://synapscare-payment.loca.lt/api/payments/payhere/notify'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - healthcare-network
    restart: unless-stopped

  telemedicine-service:
    build: ./telemedicine-service
    container_name: synapscare-telemedicine-service
    ports:
      - '8087:8087'
    environment:
      - 'SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/synapscare'
      - 'SPRING_DATASOURCE_USERNAME=postgres'
      - 'SPRING_DATASOURCE_PASSWORD=1234'
      - 'SPRING_JPA_HIBERNATE_DDL_AUTO=update'
      - 'SPRING_APPLICATION_NAME=telemedicine-service'
      - 'SPRING_RABBITMQ_HOST=rabbitmq'
      - 'SPRING_RABBITMQ_PORT=5672'
      - 'SPRING_RABBITMQ_USERNAME=admin'
      - 'SPRING_RABBITMQ_PASSWORD=admin123'
      - 'JITSI_SERVER_URL=https://meet.jit.si'
      - 'JITSI_APP_ID=synapscare'
      - 'JITSI_APP_SECRET=synapscare-jitsi-secret-2024'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - healthcare-network
    restart: unless-stopped

  prescription-service:
    build: ./prescription-service
    container_name: synapscare-prescription-service
    ports:
      - '8088:8088'
    environment:
      - 'SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/synapscare'
      - 'SPRING_DATASOURCE_USERNAME=postgres'
      - 'SPRING_DATASOURCE_PASSWORD=1234'
      - 'SPRING_JPA_HIBERNATE_DDL_AUTO=update'
      - 'SPRING_APPLICATION_NAME=prescription-service'
      - 'SPRING_RABBITMQ_HOST=rabbitmq'
      - 'SPRING_RABBITMQ_PORT=5672'
      - 'SPRING_RABBITMQ_USERNAME=admin'
      - 'SPRING_RABBITMQ_PASSWORD=admin123'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - healthcare-network
    restart: unless-stopped

  notification-service:
    build: ./notification-service
    container_name: synapscare-notification-service
    ports:
      - '8089:8089'
    environment:
      - 'SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/synapscare'
      - 'SPRING_DATASOURCE_USERNAME=postgres'
      - 'SPRING_DATASOURCE_PASSWORD=1234'
      - 'SPRING_JPA_HIBERNATE_DDL_AUTO=update'
      - 'SPRING_APPLICATION_NAME=notification-service'
      - 'SPRING_RABBITMQ_HOST=rabbitmq'
      - 'SPRING_RABBITMQ_PORT=5672'
      - 'SPRING_RABBITMQ_USERNAME=admin'
      - 'SPRING_RABBITMQ_PASSWORD=admin123'
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - healthcare-network
    restart: unless-stopped

  api-gateway:
    build: ./api-gateway
    container_name: synapscare-api-gateway
    ports:
      - '8080:8080'
    environment:
      - 'SPRING_APPLICATION_NAME=api-gateway'
      - 'AUTH_SERVICE_URL=http://auth-service:8081'
      - 'DOCTOR_SERVICE_URL=http://doctor-service:8082'
      - 'APPOINTMENT_SERVICE_URL=http://appointment-service:8083'
      - 'PATIENT_SERVICE_URL=http://patient-service:8084'
      - 'INTEGRATION_SERVICE_URL=http://ai-symptom-checker-service:8085'
      - 'AI_SERVICE_URL=http://ai-symptom-checker-service:8085'
      - 'PAYMENT_SERVICE_URL=http://payment-service:8086'
      - 'TELEMEDICINE_SERVICE_URL=http://telemedicine-service:8087'
      - 'PRESCRIPTION_SERVICE_URL=http://prescription-service:8088'
      - 'NOTIFICATION_SERVICE_URL=http://notification-service:8089'
    depends_on:
      - auth-service
      - doctor-service
      - appointment-service
      - patient-service
      - payment-service
      - telemedicine-service
      - prescription-service
      - notification-service
    networks:
      - healthcare-network
    restart: unless-stopped

networks:
  healthcare-network:
    driver: bridge

volumes:
  rabbitmq-data:
  minio-data:

