server:
  port: 8086

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/synapscare
    username: ${DB_USER:postgres}
    password: ${DB_PASS:Luqa}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:admin}
    password: ${RABBITMQ_PASSWORD:admin123}

# PayHere Sandbox Configuration
# Merchant ID: 1233989 (from your screenshot)
payhere:
  merchant-id: ${PAYHERE_MERCHANT_ID:1233989}
  merchant-secret: ${PAYHERE_MERCHANT_SECRET:MTcyODEzMjU3MzIyNzA0OTMxODkyMDU1NjQ2NTExMjAwNjgyODc2Mg==}
  sandbox-url: https://sandbox.payhere.lk/pay/checkout

# Notify URL where PayHere POSTs callback
app:
  notify-url: https://synapscare-payment.loca.lt/api/payments/payhere/notify

logging:
  level:
    com.healthcare.payment: DEBUG
