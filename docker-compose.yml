version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: healthcare_postgres
    environment:
      POSTGRES_DB: hospital_system
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1234"
    ports:
      - "5432:5432"
    networks:
      - healthcare-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hospital_system"]
      interval: 10s
      timeout: 5s
      retries: 5

  patient-service:
    build:
      context: ./patient-service
    container_name: patient-service
    ports:
      - "8081:8081"
    environment:
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASS=1234
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - healthcare-net

  doctor-service:
    build:
      context: ./doctor-service
    container_name: doctor-service
    ports:
      - "8082:8082"
    environment:
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASS=1234
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - healthcare-net

  appointment-service:
    build:
      context: ./appointment-service
    container_name: appointment-service
    ports:
      - "8083:8083"
    environment:
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASS=1234
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - healthcare-net

  integration-service:
    build:
      context: ./integration-service
    container_name: integration-service
    ports:
      - "8084:8084"
    environment:
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASS=1234
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - healthcare-net

  admin-service:
    build:
      context: ./admin-service
    container_name: admin-service
    ports:
      - "8085:8085"
    networks:
      - healthcare-net

networks:
  healthcare-net:
    driver: bridge



