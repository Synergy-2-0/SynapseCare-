spring.application.name=ai-symptom-checker-service
server.port=8085

# ─── Mistral AI ────────────────────────────────────────────────────────────────
spring.ai.mistralai.api-key=${MISTRAL_API_KEY:yAgB9m01JEg3YaFmT2OMa9iAuowSkhkA}
spring.ai.mistralai.chat.options.model=mistral-small-latest
spring.ai.mistralai.chat.options.temperature=0.3
spring.ai.mistralai.chat.options.max-tokens=1024

# ─── JWT (shared secret with all other services) ───────────────────────────────
app.jwt.secret=${JWT_SECRET:ejedVZ4KIRRaAy8kWjs4QSadL823O1WKUDanGentLY3}

# ─── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ─── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.synapscare=DEBUG
logging.level.org.springframework.ai=INFO
logging.level.org.springframework.security=WARN
