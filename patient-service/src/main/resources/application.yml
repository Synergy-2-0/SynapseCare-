server:
  port: 8084

spring:
  application:
    name: patient-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/synapscare
    username: ${DB_USER:postgres}
    password: ${DB_PASS:Luqa}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  hikari:
    connection-timeout: 30000
    maximum-pool-size: 10
    idle-timeout: 600000
    max-lifetime: 1800000

  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: 5672
    username: ${RABBIT_USER:admin}
    password: ${RABBIT_PASS:admin123}
    template:
      exchange: ${PATIENT_EXCHANGE:patient.exchange}
      routing-key: ${PATIENT_ROUTING_KEY:patient.routing.key}

app:
  rabbitmq:
    queue: ${PATIENT_QUEUE:patient.queue}
    exchange: ${PATIENT_EXCHANGE:patient.exchange}
    routing-key: ${PATIENT_ROUTING_KEY:patient.routing.key}

# MinIO Configuration for file storage
minio:
  url: ${MINIO_URL:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: ${MINIO_BUCKET:medical-reports}

# File upload settings
spring.servlet.multipart:
  max-file-size: 10MB
  max-request-size: 10MB
