<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HealthPlus</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Header / Navbar -->
    <header id="navbar" class="scrolled">
        <a href="index.html" class="logo">
            <i class="fa-solid fa-heart-pulse"></i>
            Health<span>Plus</span>
        </a>
    </header>

    <!-- Login Section -->
    <div class="auth-container">
        <!-- Background Elements -->
        <div class="hero-bg" style="top: -20%; right: auto; left: -10%; background: radial-gradient(circle, rgba(74,144,226,0.3) 0%, rgba(80,227,194,0.1) 70%);"></div>
        <div class="hero-bg" style="bottom: -20%; right: -10%; top: auto; background: radial-gradient(circle, rgba(80,227,194,0.3) 0%, rgba(74,144,226,0.1) 70%);"></div>

        <div class="glass auth-card">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Please enter your credentials to login</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="john.doe@example.com" required>
                    <i class="fa-regular fa-envelope"></i>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                    <i class="fa-solid fa-lock"></i>
                </div>

                <div class="form-group" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <label class="checkbox-container" style="display: flex; align-items: center; gap: 8px; font-weight: 400; cursor: pointer;">
                        <input type="checkbox" style="width: auto;"> Remember me
                    </label>
                    <a href="#" style="color: var(--primary-color); text-decoration: none; font-size: 0.9rem; font-weight: 500;">Forgot Password?</a>
                </div>
                
                <button type="submit" class="btn btn-primary">Sign In</button>
                
                <div class="auth-links">
                    <p>Don't have an account? <a href="register.html">Sign up</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
