<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background Circle -->
  <circle cx="200" cy="150" r="120" fill="#EBF5FF" opacity="0.5"/>

  <!-- AI Brain -->
  <ellipse cx="200" cy="130" rx="60" ry="50" fill="#0066CC" opacity="0.1"/>
  <path d="M160 130 Q170 90 200 85 Q230 90 240 130 Q230 170 200 175 Q170 170 160 130Z" fill="#0066CC" opacity="0.2"/>

  <!-- Neural Network Lines -->
  <circle cx="180" cy="110" r="8" fill="#0066CC"/>
  <circle cx="220" cy="110" r="8" fill="#14B8A6"/>
  <circle cx="200" cy="140" r="10" fill="#0066CC"/>
  <circle cx="170" cy="145" r="6" fill="#14B8A6"/>
  <circle cx="230" cy="145" r="6" fill="#14B8A6"/>
  <circle cx="200" cy="100" r="6" fill="#0066CC"/>

  <!-- Connection Lines -->
  <line x1="180" y1="110" x2="200" y2="140" stroke="#0066CC" stroke-width="2" opacity="0.5"/>
  <line x1="220" y1="110" x2="200" y2="140" stroke="#14B8A6" stroke-width="2" opacity="0.5"/>
  <line x1="200" y1="100" x2="180" y2="110" stroke="#0066CC" stroke-width="2" opacity="0.5"/>
  <line x1="200" y1="100" x2="220" y2="110" stroke="#14B8A6" stroke-width="2" opacity="0.5"/>
  <line x1="170" y1="145" x2="200" y2="140" stroke="#14B8A6" stroke-width="2" opacity="0.5"/>
  <line x1="230" y1="145" x2="200" y2="140" stroke="#14B8A6" stroke-width="2" opacity="0.5"/>

  <!-- Medical Cross -->
  <rect x="190" y="180" width="20" height="40" rx="3" fill="#0066CC"/>
  <rect x="180" y="190" width="40" height="20" rx="3" fill="#0066CC"/>

  <!-- Pulse Line -->
  <path d="M120 230 L150 230 L160 210 L175 250 L190 220 L205 240 L215 230 L280 230"
        stroke="#14B8A6" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Decorative Dots -->
  <circle cx="100" cy="100" r="4" fill="#0066CC" opacity="0.3"/>
  <circle cx="300" cy="100" r="4" fill="#14B8A6" opacity="0.3"/>
  <circle cx="120" cy="180" r="3" fill="#0066CC" opacity="0.2"/>
  <circle cx="280" cy="180" r="3" fill="#14B8A6" opacity="0.2"/>
</svg>
