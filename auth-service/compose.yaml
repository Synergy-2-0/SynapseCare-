services:
  postgres:
    image: 'postgres:latest'
    container_name: synapscare-postgres
    environment:
      - 'POSTGRES_DB=synapscare'
      - 'POSTGRES_PASSWORD=Luqa'
      - 'POSTGRES_USER=postgres'
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthcare-network

  user-service:
    build: .
    container_name: synapscare-user-service
    ports:
      - '8080:8080'
    environment:
      - 'SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/synapscare'
      - 'SPRING_DATASOURCE_USERNAME=postgres'
      - 'SPRING_DATASOURCE_PASSWORD=Luqa'
      - 'SPRING_JPA_HIBERNATE_DDL_AUTO=update'
      - 'SPRING_APPLICATION_NAME=userService'
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - healthcare-network
    restart: unless-stopped

networks:
  healthcare-network:
    driver: bridge
