server:
  port: 8087

spring:
  application:
    name: telemedicine-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/synapscare
    username: ${DB_USER:postgres}
    password: ${DB_PASS:Luqa}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:admin}
    password: ${RABBITMQ_PASSWORD:admin123}

# RabbitMQ Configuration
app:
  rabbitmq:
    exchange: ${RABBITMQ_EXCHANGE:healthcare.exchange}

# Service URLs for inter-service communication
services:
  appointment:
    url: ${APPOINTMENT_SERVICE_URL:http://localhost:8083}

# Telemedicine Configuration
telemedicine:
  stub-mode: ${TELEMEDICINE_STUB_MODE:true}
  jitsi-base-url: ${JITSI_BASE_URL:https://meet.jit.si}

# Jitsi Meet Configuration
# Using public meet.jit.si — no server setup required!
# For self-hosted Jitsi, change the server-url and configure app-id/app-secret in Prosody.
jitsi:
  server-url: ${JITSI_SERVER_URL:https://meet.jit.si}
  app-id: ${JITSI_APP_ID:synapscare}
  app-secret: ${JITSI_APP_SECRET:synapscare-jitsi-secret-2024}

logging:
  level:
    com.healthcare.telemedicine: DEBUG
