spring.application.name=api-gateway

# Server port - gateway sits in front of all services
server.port=8080

# ─── Global CORS Configuration ────────────────────────────────────────────────
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:3000
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true

# ─── Service Hosts (overridable via env vars in Docker) ───────────────────────
auth.service.url=${AUTH_SERVICE_URL:http://localhost:8081}
doctor.service.url=${DOCTOR_SERVICE_URL:http://localhost:8082}
appointment.service.url=${APPOINTMENT_SERVICE_URL:http://localhost:8083}
patient.service.url=${PATIENT_SERVICE_URL:http://localhost:8084}
integration.service.url=${INTEGRATION_SERVICE_URL:http://localhost:8085}

# ─── Route Definitions ────────────────────────────────────────────────────────
# Auth Service
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=${auth.service.url}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=0

# Doctor Service
spring.cloud.gateway.routes[1].id=doctor-service
spring.cloud.gateway.routes[1].uri=${doctor.service.url}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/doctors/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=0

# Appointment Service
spring.cloud.gateway.routes[2].id=appointment-service
spring.cloud.gateway.routes[2].uri=${appointment.service.url}
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/appointments/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=0

# Patient Service
spring.cloud.gateway.routes[3].id=patient-service
spring.cloud.gateway.routes[3].uri=${patient.service.url}
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/patients/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=0

# Integration Service
spring.cloud.gateway.routes[4].id=integration-service
spring.cloud.gateway.routes[4].uri=${integration.service.url}
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/integration/**
spring.cloud.gateway.routes[4].filters[0]=RewritePath=/api/integration/(?<segment>.*), /api/v1/integration/${segment}

# Admin Service (served by auth-service)
spring.cloud.gateway.routes[5].id=admin-service
spring.cloud.gateway.routes[5].uri=${auth.service.url}
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/admin/**
spring.cloud.gateway.routes[5].filters[0]=StripPrefix=0

# ─── JWT Configuration (shared secret with auth-service and doctor-service) ───
app.jwt.secret=ejedVZ4KIRRaAy8kWjs4QSadL823O1WKUDanGentLY3

# ─── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.gateway.enabled=true

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.synapscare.gateway=DEBUG
logging.level.org.springframework.cloud.gateway=INFO
