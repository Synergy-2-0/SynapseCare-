spring.application.name=api-gateway

# Server port - gateway sits in front of all services
server.port=8080

# ─── Global CORS Configuration ────────────────────────────────────────────────
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:3002,http://127.0.0.1:3000,http://127.0.0.1:3001,http://127.0.0.1:3002
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].max-age=3600

# NUCLEAR OPTION: Force Gateway to be the ONLY source of CORS headers
# We remove any CORS headers coming from downstream services to avoid duplicates
spring.cloud.gateway.default-filters[0].name=RemoveResponseHeader
spring.cloud.gateway.default-filters[0].args.name=Access-Control-Allow-Origin
spring.cloud.gateway.default-filters[1].name=RemoveResponseHeader
spring.cloud.gateway.default-filters[1].args.name=Access-Control-Allow-Credentials

# ─── Service Hosts (overridable via env vars in Docker) ───────────────────────
auth.service.url=${AUTH_SERVICE_URL:http://localhost:8081}
doctor.service.url=${DOCTOR_SERVICE_URL:http://localhost:8082}
appointment.service.url=${APPOINTMENT_SERVICE_URL:http://localhost:8083}
patient.service.url=${PATIENT_SERVICE_URL:http://localhost:8084}
integration.service.url=${INTEGRATION_SERVICE_URL:http://localhost:8086}
ai.service.url=${AI_SERVICE_URL:http://localhost:8085}

# ─── Route Definitions ────────────────────────────────────────────────────────
# Auth Service (main route)
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=${auth.service.url}
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

# Auth Service API route (for /api/auth paths)
spring.cloud.gateway.routes[1].id=auth-service-api
spring.cloud.gateway.routes[1].uri=${auth.service.url}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/auth/**

# Doctor Service
spring.cloud.gateway.routes[2].id=doctor-service
spring.cloud.gateway.routes[2].uri=${doctor.service.url}
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/doctors/**

# Appointment Service
spring.cloud.gateway.routes[3].id=appointment-service
spring.cloud.gateway.routes[3].uri=${appointment.service.url}
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/appointments/**
spring.cloud.gateway.routes[3].filters[0]=RewritePath=/api/appointments/(?<segment>.*), /api/v1/appointments/$\{segment}


# Patient Service
spring.cloud.gateway.routes[4].id=patient-service
spring.cloud.gateway.routes[4].uri=${patient.service.url}
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/patients/**


# AI Symptom Checker Service (port 8085)
spring.cloud.gateway.routes[5].id=ai-symptom-checker-service
spring.cloud.gateway.routes[5].uri=${ai.service.url}
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/symptoms/**

# Payment Service
spring.cloud.gateway.routes[6].id=payment-service
spring.cloud.gateway.routes[6].uri=${PAYMENT_SERVICE_URL:http://localhost:8086}
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/payments/**


# Telemedicine Service
spring.cloud.gateway.routes[7].id=telemedicine-service
spring.cloud.gateway.routes[7].uri=${TELEMEDICINE_SERVICE_URL:http://localhost:8087}
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/telemedicine/**


# Prescription Service
spring.cloud.gateway.routes[8].id=prescription-service
spring.cloud.gateway.routes[8].uri=${PRESCRIPTION_SERVICE_URL:http://localhost:8088}
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/prescriptions/**


# Notification Service
spring.cloud.gateway.routes[9].id=notification-service
spring.cloud.gateway.routes[9].uri=http://notification-service:8089
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/notifications/**

# Admin Service (served by auth-service)
spring.cloud.gateway.routes[10].id=admin-service
spring.cloud.gateway.routes[10].uri=${auth.service.url}
spring.cloud.gateway.routes[10].predicates[0]=Path=/api/admin/**

# Medical History (served by patient-service)
spring.cloud.gateway.routes[11].id=medical-history-service
spring.cloud.gateway.routes[11].uri=${patient.service.url}
spring.cloud.gateway.routes[11].predicates[0]=Path=/api/medical-history/**

# Uploads specifically (served by patient-service static resources)
spring.cloud.gateway.routes[12].id=patient-uploads
spring.cloud.gateway.routes[12].uri=${patient.service.url}
spring.cloud.gateway.routes[12].predicates[0]=Path=/uploads/**


# ─── JWT Configuration (shared secret with auth-service and doctor-service) ───
app.jwt.secret=ejedVZ4KIRRaAy8kWjs4QSadL823O1WKUDanGentLY3

# ─── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.gateway.enabled=true

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.synapscare.gateway=DEBUG
logging.level.org.springframework.cloud.gateway=INFO

# Decommissioned Clinical Capacity Shards
spring.servlet.multipart.max-file-size=-1
spring.servlet.multipart.max-request-size=-1
spring.codec.max-in-memory-size=-1
