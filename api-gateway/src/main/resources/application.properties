spring.application.name=api-gateway

# Server port - gateway sits in front of all services
server.port=8080

# ─── Route Definitions ────────────────────────────────────────────────────────
# Auth Service (port 8081) - public, no JWT required for /auth/login and /auth/register
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=0

# Doctor Service (port 8082)
spring.cloud.gateway.routes[1].id=doctor-service
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/doctors/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=0

# ─── JWT Configuration (shared secret with auth-service and doctor-service) ───
app.jwt.secret=ejedVZ4KIRRaAy8kWjs4QSadL823O1WKUDanGentLY3

# ─── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.gateway.enabled=true

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.synapscare.gateway=DEBUG
logging.level.org.springframework.cloud.gateway=INFO
