services:
  postgres-doctor:
    image: postgres:15
    environment:
      POSTGRES_DB: doctor_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - doctor_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      retries: 5

  doctor-service:
    build: .
    ports:
      - "8082:8082"
    depends_on:
      postgres-doctor:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-doctor:5432/doctor_service_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: your-super-secret-jwt-key-change-in-production-at-least-32-chars
      USER_SERVICE_BASE_URL: http://host.docker.internal:8080
      INTERNAL_SERVICE_SECRET: synapscare-internal-secret-2026

volumes:
  doctor_pgdata: