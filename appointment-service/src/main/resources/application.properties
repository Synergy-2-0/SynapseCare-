server.port=8083
spring.application.name=appointment-service
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/synapscare
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:Luqa}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
doctor-service.base-url=${DOCTOR_SERVICE_URL:http://localhost:8082}
patient-service.base-url=${PATIENT_SERVICE_URL:http://localhost:8084}

spring.rabbitmq.host=${RABBIT_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBIT_USER:admin}
spring.rabbitmq.password=${RABBIT_PASS:admin123}

app.rabbitmq.queue=${APPOINTMENT_QUEUE:appointment.queue}
app.rabbitmq.exchange=${APPOINTMENT_EXCHANGE:appointment.exchange}
app.rabbitmq.routing-key=${APPOINTMENT_ROUTING_KEY:appointment.routing.key}